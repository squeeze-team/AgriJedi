services:
  agrimaster:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    container_name: agrimaster-app
    depends_on:
      - redis
    ports:
      - "8000:8000"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: agrimaster-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]

volumes:
  redis_data:
