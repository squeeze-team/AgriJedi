<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>AgriIntel — France Wheat Yield & Price Prediction</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

  <style>
    :root {
      --bg: #f7f8fa;
      --card: #ffffff;
      --border: #e2e6ea;
      --accent: #2563eb;
      --accent-light: #dbeafe;
      --green: #16a34a;
      --red: #dc2626;
      --orange: #ea580c;
      --text: #1e293b;
      --text-muted: #64748b;
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    /* ── Header ─────────────────────────────────── */
    header {
      background: var(--accent);
      color: #fff;
      padding: 18px 28px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.10);
    }
    header h1 { font-size: 22px; font-weight: 700; }
    header select {
      padding: 6px 12px;
      border-radius: 6px;
      border: none;
      font-size: 14px;
    }
    header .actions { margin-left: auto; display: flex; gap: 10px; }
    header button {
      padding: 8px 18px;
      border-radius: 6px;
      border: none;
      background: #fff;
      color: var(--accent);
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
    }
    header button:hover { background: var(--accent-light); }

    /* ── Layout ──────────────────────────────────── */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 420px 320px;
      gap: 16px;
      padding: 20px 28px;
      max-width: 1400px;
      margin: 0 auto;
    }
    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; grid-template-rows: auto; }
    }

    /* ── Cards ───────────────────────────────────── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .card-header {
      padding: 12px 16px;
      font-weight: 600;
      font-size: 15px;
      border-bottom: 1px solid var(--border);
      background: #fafbfc;
    }
    .card-body { flex: 1; position: relative; }
    #map { width: 100%; height: 100%; }

    /* ── Prediction card ─────────────────────────── */
    .prediction {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
    }
    .pred-section {
      padding: 20px 24px;
    }
    .pred-section + .pred-section {
      border-left: 1px solid var(--border);
    }
    .pred-section h3 {
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      margin-bottom: 10px;
    }
    .pred-value {
      font-size: 32px;
      font-weight: 700;
    }
    .pred-detail {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 6px;
    }
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    .badge-up   { background: #fef2f2; color: var(--red); }
    .badge-down { background: #f0fdf4; color: var(--green); }
    .badge-flat { background: #fffbeb; color: var(--orange); }
    .explanation {
      margin-top: 12px;
      padding: 10px 14px;
      background: #f8fafc;
      border-radius: 8px;
      font-size: 13px;
      color: var(--text-muted);
      border-left: 3px solid var(--accent);
    }

    /* ── Chart container ─────────────────────────── */
    .chart-wrap { padding: 12px; height: 100%; }
    .chart-wrap canvas { width: 100% !important; height: 100% !important; }

    /* ── Loading ──────────────────────────────────── */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-muted);
      font-size: 14px;
    }

    /* ── Legend overlay on map ────────────────────── */
    .map-legend {
      position: absolute;
      right: 10px; bottom: 24px;
      background: rgba(255,255,255,0.92);
      padding: 8px 10px 4px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
      z-index: 500;
      max-width: 200px;
    }
    .map-legend h4 { font-size: 12px; margin-bottom: 4px; }
    .map-legend img { width: 100%; height: auto; }
  </style>
</head>
<body>

  <!-- ── Header ───────────────────────────────────── -->
  <header>
    <h1>🌾 AgriIntel</h1>
    <label style="font-size:14px;">
      Crop:
      <select id="cropSelect">
        <option value="wheat" selected>Wheat</option>
        <option value="maize">Maize</option>
        <option value="grape">Grape</option>
      </select>
    </label>
    <span style="font-size:14px;">Country: <strong>France</strong></span>
    <div class="actions">
      <button id="btnPredict" onclick="runPredictions()">▶ Run Prediction</button>
    </div>
  </header>

  <!-- ── Main grid ────────────────────────────────── -->
  <div class="grid">

    <!-- Map -->
    <div class="card">
      <div class="card-header">🗺 Crop Distribution — CLMS + Sentinel-2</div>
      <div class="card-body">
        <div id="map"></div>
      </div>
    </div>

    <!-- Weather chart -->
    <div class="card">
      <div class="card-header">🌦 Weather — Last 24 Months</div>
      <div class="card-body chart-wrap">
        <canvas id="weatherChart"></canvas>
      </div>
    </div>

    <!-- Price chart -->
    <div class="card">
      <div class="card-header">💰 Commodity Price History</div>
      <div class="card-body chart-wrap">
        <canvas id="priceChart"></canvas>
      </div>
    </div>

    <!-- Prediction card -->
    <div class="card prediction" id="predCard">
      <div class="pred-section" id="yieldSection">
        <h3>🌾 Yield Prediction</h3>
        <div class="loading" id="yieldLoading">Select crop & click <strong>Run Prediction</strong></div>
        <div id="yieldResult" style="display:none;"></div>
      </div>
      <div class="pred-section" id="priceSection">
        <h3>📈 Price Forecast (3-month)</h3>
        <div class="loading" id="priceLoading">Waiting for prediction…</div>
        <div id="priceResult" style="display:none;"></div>
      </div>
    </div>
  </div>

<script src="main.js"></script>
</body>
</html>
